<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Planner DM 360 · Enrique César</title>
  <meta name="theme-color" content="#006241" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<header class="hero">
  <div>
    <p class="eyebrow">Planner DM 360 · PWA</p>
    <h1>Agenda estratégica de visitas 2026</h1>
    <p>Visibilidad semanal, rutas cercanas, frecuencias por periodo, enfoque Approach y exportación ICS.</p>
  </div>
  <div class="hero-actions">
    <button id="installBtn" class="ghost hidden">Instalar app</button>
    <button id="resetBtn" class="ghost">Regenerar base</button>
  </div>
</header>

<main class="wrap">
  <section class="panel controls">
    <label>Año<select id="yearSel"><option>2026</option></select></label>
    <label>Mes<select id="monthSel"></select></label>
    <label>Semana<select id="weekSel"></select></label>
    <label>Tipo de visita<select id="typeSel"></select></label>
    <label>Tienda foco<select id="storeSel"></select></label>
    <label class="search">Buscar<input id="searchInput" placeholder="Buscar tienda, gerente, actividad, enfoque..." /></label>
    <label>Bloqueo desde<input id="blockFrom" type="date" /></label>
    <label>Bloqueo hasta<input id="blockTo" type="date" /></label>
    <label>Motivo<input id="blockReason" placeholder="Vacaciones, descanso, eventualidad" /></label>
    <div class="buttons">
      <button id="generateBtn">Generar agenda</button>
      <button id="blockBtn" class="secondary">Agregar bloqueo</button>
      <button id="icsMonthBtn" class="gold">Exportar ICS mes</button>
      <button id="icsYearBtn" class="outline">Exportar ICS año</button>
    </div>
  </section>

  <section class="kpis" id="kpis"></section>

  <section class="layout">
    <aside class="sidebar">
      <article class="panel intention" id="intention"></article>
      <article class="panel routeBox">
        <div class="routeHead"><h2>Ruta sugerida</h2><select id="routeDateSel"></select></div>
        <div id="routeMap" class="routeMap"></div>
        <div id="routeList"></div>
      </article>
      <article class="panel coverage"><h2>Cobertura semanal</h2><div id="coverageList"></div></article>
    </aside>

    <section class="panel calendarPanel">
      <div class="calHead">
        <h2 id="calTitle">Agenda</h2>
        <div id="legend" class="legend"></div>
      </div>
      <div id="calendar" class="calendar"></div>
    </section>
  </section>

  <section class="panel detailPanel">
    <h2>Agenda detallada</h2>
    <div class="detailTools"><input id="detailSearch" placeholder="Filtrar detalle..." /><button id="copyRouteBtn" class="outline">Copiar ruta del día</button></div>
    <div class="tableWrap"><table id="detailTable"></table></div>
  </section>
</main>

<script src="data/agenda_base.js"></script>
<script src="js/app.js"></script>
</body>
</html>
